services:
  node:
    build: .
    container_name: agora-node
    hostname: node
    ports:
      - "8080:8080"   # browser -> http://localhost:8080
    volumes:
      - agora-data:/root/.config/agora   # persist identity, posts, DMs across restarts
    networks: [p2pnet]

volumes:
  agora-data:

networks:
  p2pnet:
    driver: bridge
